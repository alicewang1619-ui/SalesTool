<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --accent: #4f46e5; --accent-hover: #4338ca; --accent-soft: #eef2ff;
    --bg: #ffffff; --text: #1f2937; --muted: #6b7280; --border: #e5e7eb;
    --danger: #dc2626; --danger-soft: #fee2e2; --success: #16a34a; --success-soft: #dcfce7;
  }
  * { box-sizing: border-box; margin: 0; }
  body { width: 320px; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--text); padding: 16px; background: var(--bg); }
  h1 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .dot { width: 14px; height: 14px; border-radius: 4px; background: var(--accent); }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
  button { width: 100%; height: 40px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: .55; cursor: not-allowed; }
  .status { margin-top: 12px; font-size: 13px; line-height: 1.6; padding: 10px; border-radius: 8px; display: none; }
  .status.show { display: block; }
  .status.ok { background: var(--success-soft); color: var(--success); }
  .status.err { background: var(--danger-soft); color: var(--danger); }
  .status.info { background: var(--accent-soft); color: var(--accent); }
  .status a { color: var(--accent); font-weight: 600; }
  .settings { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .settings label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .settings input { width: 100%; height: 32px; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; font-size: 13px; }
</style>
</head>
<body>
  <h1><span class="dot"></span>剪藏到知识库</h1>
  <div class="sub">把当前页面的正文一键存入本地知识库，AI 自动打标签和摘要。公众号文章也支持（用已打开的页面，绕过反爬）。</div>
  <button id="clip">📎 剪藏当前页面</button>
  <div id="status" class="status"></div>
  <div class="settings">
    <label for="backend">后端地址</label>
    <input id="backend" type="text" placeholder="http://localhost:8787" />
  </div>
  <script src="popup.js"></script>
</body>
</html>
