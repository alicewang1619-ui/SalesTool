<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>项目灯塔 · P02</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--letterbox);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
:root{
  --bg:#f6f8fc; --surface:#ffffff; --ink:#0f1f3d; --soft:#5b6b85; --line:#e4eaf3;
  --accent:#2563eb; --accent-2:#1e40af; --accent-soft:#e6efff;
  --green:#16a34a; --amber:#f59e0b; --red:#dc2626;
  --hero:#0c1730; --hero-2:#13234A; --hero-ink:#eaf1ff; --hero-soft:#9fb2d6;
  --accent-bright:#6EA0FF; --grey:#94A3B8; --phase2:#5B7CC4; --hero-line:#28406E;
  --on-accent:#FFFFFF; --letterbox:#0A1020;
  --radius:1.4em; --radius-sm:.8em;
}
.wrap{position:fixed;inset:0;display:grid;place-items:center;background:var(--letterbox);overflow:hidden;}
.stage{position:relative;width:min(100vw,177.78vh);height:min(56.25vw,100vh);
  font-size:calc(min(100vw,177.78vh)/100);background:var(--bg);color:var(--ink);overflow:hidden;}
.stage.hero{background:radial-gradient(120% 120% at 80% 10%,var(--hero-2),var(--hero) 60%);color:var(--hero-ink);}
.pad{position:absolute;inset:0;padding:7em 8em;display:flex;flex-direction:column;}
.kicker{font-size:1.6em;letter-spacing:.42em;color:var(--accent);font-weight:800;text-transform:uppercase;}
.hero .kicker{color:var(--accent-bright);}
h1{font-size:6.4em;line-height:1.04;font-weight:800;letter-spacing:-.01em;}
h2{font-size:3.9em;line-height:1.12;font-weight:800;margin-bottom:.1em;}
.lead{font-size:2.15em;color:var(--soft);line-height:1.5;font-weight:500;}
.hero .lead{color:var(--hero-soft);}
.spacer{flex:1;}
.pageno{position:absolute;bottom:3.2em;left:8em;font-size:1.45em;color:var(--soft);font-weight:800;letter-spacing:.1em;}
.nav{position:absolute;bottom:3em;right:8em;font-size:1.45em;color:var(--soft);display:flex;gap:1.4em;align-items:center;font-weight:700;}
.nav a{color:var(--accent);text-decoration:none;}
.hero .pageno{color:var(--hero-soft);} .hero .nav{color:var(--hero-soft);} .hero .nav a{color:var(--accent-bright);}
.tag{display:inline-block;font-size:1.5em;font-weight:700;color:var(--accent);background:var(--accent-soft);
  padding:.5em 1.1em;border-radius:2em;}
.grid{display:grid;gap:1.6em;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:1.8em 2em;
  box-shadow:0 1.2em 3em -1.6em rgba(15,31,61,.25);}
.card .ct{font-size:1.9em;font-weight:800;margin-bottom:.35em;}
.card .cd{font-size:1.55em;color:var(--soft);line-height:1.5;}
.card .ico{font-size:2.4em;margin-bottom:.2em;display:block;}
.k{display:flex;gap:1.2em;flex-wrap:wrap;}
.kw{font-size:2.1em;font-weight:800;color:var(--accent);background:var(--accent-soft);padding:.45em 1em;border-radius:.7em;}
.stat{font-size:9em;font-weight:800;line-height:1;letter-spacing:-.02em;}
.stat .u{font-size:.32em;color:var(--soft);font-weight:700;}
.dot{display:inline-block;width:.85em;height:.85em;border-radius:50%;vertical-align:middle;}
.lights{display:flex;gap:1.6em;align-items:center;font-size:1.7em;font-weight:700;}
.lights .it{display:flex;gap:.55em;align-items:center;color:var(--soft);}
ul.clean{list-style:none;display:flex;flex-direction:column;gap:1em;}
ul.clean li{font-size:1.95em;line-height:1.4;padding-left:1.6em;position:relative;}
ul.clean li::before{content:"";position:absolute;left:0;top:.55em;width:.7em;height:.7em;border-radius:.2em;background:var(--accent);}
.quote{font-size:3.2em;font-weight:800;line-height:1.28;letter-spacing:-.01em;}
.quote .hl{color:var(--accent);} .hero .quote .hl{color:var(--accent-bright);}
.src{font-size:1.3em;color:var(--soft);}
.board{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:1.6em;display:grid;
  grid-template-columns:repeat(6,1fr);gap:1em;}
.cell{border-radius:.6em;padding:1em .8em;color:var(--on-accent);font-size:1.35em;font-weight:700;line-height:1.25;min-height:5.2em;
  display:flex;flex-direction:column;justify-content:space-between;}
.cell small{font-weight:600;opacity:.9;font-size:.82em;}
.flow{display:flex;align-items:center;gap:1em;flex-wrap:wrap;font-size:1.6em;font-weight:700;}
.step{background:var(--surface);border:1px solid var(--line);border-radius:.8em;padding:.9em 1.2em;}
.arrow{color:var(--accent);font-size:1.3em;}
.phase{display:flex;flex-direction:column;gap:1.2em;}
.prow{display:grid;grid-template-columns:14em 1fr;gap:1.6em;align-items:stretch;}
.pbadge{border-radius:var(--radius-sm);padding:1em 1.2em;font-size:1.7em;font-weight:800;color:var(--on-accent);display:flex;align-items:center;justify-content:center;text-align:center;}
.pbody{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:1.1em 1.5em;font-size:1.6em;color:var(--soft);display:flex;align-items:center;line-height:1.45;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:2em;}
.label{font-size:1.45em;font-weight:800;color:var(--accent);letter-spacing:.05em;margin-bottom:.5em;text-transform:uppercase;}
</style></head>
