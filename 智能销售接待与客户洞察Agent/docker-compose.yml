services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ultrasound_growth
      POSTGRES_USER: ultrasound
      POSTGRES_PASSWORD: ultrasound_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://ultrasound:ultrasound_dev_password@postgres:5432/ultrasound_growth
      JWT_SECRET: local-dev-change-me
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:

